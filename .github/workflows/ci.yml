name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run phase0:verify
      - run: npm run phase7:verify
      - run: npm run lint
      - run: npm run build
      - name: Function syntax check
        run: |
          set -e
          for f in functions/*/src/main.js scripts/*.mjs; do node --check "$f"; done
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high || true
